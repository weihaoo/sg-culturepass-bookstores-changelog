name: Track Bookstore Changes

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Run tracker
        env:
          DEFAULT_API_URL: ${{ secrets.DEFAULT_API_URL }}
          ONE_MAP_SEARCH_URL: ${{ secrets.ONE_MAP_SEARCH_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python tracker.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/bookstores.json README.md 2>/dev/null; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bookstores.json README.md
          git commit -m "chore: update bookstores data $(date -u +%Y-%m-%d)"
          git push
